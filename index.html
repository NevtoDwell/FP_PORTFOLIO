<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | My Creative Space</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        /* ПОДКЛЮЧЕНИЕ ВАРИАТИВНОГО ШРИФТА */
        @font-face {
            font-family: 'ScienceGothic';
            src: url('fonts/science-gothic.ttf') format('truetype-variations'),
                 url('fonts/science-gothic.ttf') format('truetype');
            font-weight: 100 900;
            font-stretch: 50% 200%;
            font-style: normal;
        }

        :root {
            --bg-color: #0f0f0f;
            --card-bg: rgba(26, 26, 26, 0.8);
            --text-color: #ffffff;
            --accent-color: #ad50c6;
            --main-color: #ad50c6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'ScienceGothic', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Контейнер для 3D графики */
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* Слой для 3D */
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #load {
            width: 205px; height: 205px;
            border-radius: 50%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            background: conic-gradient(var(--main-color) 0deg, #222 0deg);
            filter: drop-shadow(0 0 20px #000000);
        }

        #load::after {
            content: attr(data-percent);
            position: absolute;
            color: var(--main-color);
            font-size: 24px;
            font-variation-settings: "wght" 700, "wdth" 110;
            bottom: -50px; left: 50%;
            transform: translateX(-50%);
            letter-spacing: 3px;
        }

        .inner-logo {
            position: absolute;
            width: 195px; height: 195px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 3;
            border: 5px solid var(--bg-color);
            background-color: var(--bg-color);
        }

        .preloader-hidden { opacity: 0; visibility: hidden; }

        /* --- CONTENT STYLES --- */
        .content-wrapper {
            position: relative;
            z-index: 2;
            pointer-events: none; 
            width: 50%; 
            margin-left: auto; 
            padding-right: 5%; 
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
        }

        .card, h1, p { pointer-events: auto; }

        header { padding: 3rem 0; display: flex; justify-content: flex-end; width: 100%; }
        header h1 {
            font-size: 1.5rem; letter-spacing: 10px;
            font-variation-settings: "wght" 200, "wdth" 150;
            text-transform: uppercase;
        }

        .hero { text-align: right; padding: 100px 0; width: 100%; }
        .hero h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-variation-settings: "wght" 900, "wdth" 140;
            text-transform: uppercase;
        }

        .hero p {
            color: var(--accent-color);
            font-size: 1.2rem; letter-spacing: 4px;
            font-variation-settings: "wght" 400, "wdth" 100;
        }

        .container { width: 100%; padding: 60px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .card {
            background: var(--card-bg);
            height: 280px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .content-wrapper {
                width: 100%;
                padding: 0 5%;
                align-items: center;
                background: rgba(15, 15, 15, 0.7); 
            }
            .hero, header { text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div id="load" data-percent="0">
            <img src="logo.jpg" alt="Logo" class="inner-logo">
        </div>
    </div>

    <div id="canvas-container"></div>

    <div class="content-wrapper">
        <header>
            <h1>PORTFOLIO</h1>
        </header>

        <section class="hero">
            <h1>Твое Имя</h1>
            <p>DIGITAL ARTIST | 3D MODELER</p>
        </section>

        <div class="container">
            <div class="grid">
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 3D ЛОГИКА ---
        let scene, camera, renderer, model;
        let isMouseDown = false;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Свет
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // Статичная сетка на полу
            const grid = new THREE.GridHelper(20, 40, 0xad50c6, 0x222222);
            grid.position.y = -2;
            grid.position.x = -4.5; 
            scene.add(grid);

            // Загрузка персонажа
            const loader = new THREE.GLTFLoader();
            loader.load('character.glb', function(gltf) {
                model = gltf.scene;
                
                model.position.y = -2; 
                model.position.x = -4.5; 
                
                // === ДЕЛАЕМ ПЕРСОНАЖА ЕЩЕ КРУПНЕЕ (увеличили с 1.5 до 3.5) ===
                model.scale.set(3.5, 3.5, 3.5); 
                // ============================================================

                model.traverse((node) => {
                    if (node.isMesh) {
                        node.material.wireframe = true;
                        node.material.color.setHex(0xffffff);
                    }
                });
                scene.add(model);
            });

            // Управление мышью 
            document.addEventListener('mousedown', () => { isMouseDown = true; });
            document.addEventListener('mouseup', () => { isMouseDown = false; });
            
            document.addEventListener('mousemove', (e) => {
                if (isMouseDown && model) {
                    model.rotation.y += e.movementX * 0.01;
                }
            });

            function animate() {
                requestAnimationFrame(animate);

                if (model) {
                    if (!isMouseDown) {
                        model.rotation.y += 0.005;
                    }
                    model.rotation.x = 0;
                    model.rotation.z = 0;
                }

                renderer.render(scene, camera);
            }
            animate();
        }

        init3D();

        // Логика прелоадера
        window.addEventListener('load', function() {
            const loaderElement = document.getElementById("load");
            const preloader = document.getElementById("preloader");
            let i = 0;

            const interval = setInterval(function () {
                if (i <= 360) {
                    loaderElement.style.background = `conic-gradient(var(--main-color) ${i}deg, #222 0deg)`;
                    loaderElement.setAttribute('data-percent', Math.round(i / 3.6));
                    i += 5;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        preloader.classList.add('preloader-hidden');
                    }, 300);
                }
            }, 16);
        });

        // Адаптация при изменении размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
