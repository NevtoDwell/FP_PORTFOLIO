<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | My Creative Space</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        /* ИСПРАВЛЕННЫЙ БЛОК ШРИФТОВ */
        @font-face {
            font-family: 'ScienceGothic';
            src: url('./fonts/science-gothic.ttf') format('truetype');
            font-weight: 100 900;
            font-display: swap;
        }

        :root {
            --bg-color: #0f0f0f;
            --card-bg: rgba(26, 26, 26, 0.8);
            --text-color: #ffffff;
            --accent-color: #ad50c6;
            --main-color: #ad50c6;
        }

        /* Общие сбросы и фикс шрифта */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'ScienceGothic', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            /* РАЗРЕШАЕМ СКРОЛЛ */
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 200vh; /* Чтобы было что крутить */
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none; 
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out, visibility 0.5s;
        }

        #load {
            width: 205px; height: 205px;
            border-radius: 50%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            background: conic-gradient(var(--main-color) 0deg, #e6e7eb 0deg);
            transition: transform 1.2s cubic-bezier(0.5, 0, 0.2, 1), opacity 0.1s ease 1.1s;
            transform-origin: center center;
        }

        #load::after {
            content: attr(data-percent);
            position: absolute;
            color: var(--main-color);
            font-size: 24px;
            bottom: -50px; left: 50%;
            transform: translateX(-50%);
            letter-spacing: 3px;
            transition: opacity 0.2s ease;
        }

        .inner-logo {
            position: absolute;
            width: 195px; height: 195px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 3;
            background-color: #e6e7eb;
        }

        .morph-animation #load { transform: scale(0.55) translateY(-90%); }
        .morph-animation #load::after { opacity: 0; }
        .preloader-hidden { opacity: 0; visibility: hidden; }

        /* --- CONTENT --- */
        .content-wrapper {
            position: relative;
            z-index: 2;
            pointer-events: none; 
            width: 50%; 
            margin-left: auto; 
            padding-right: 5%; 
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
            opacity: 0;
            transition: opacity 1.5s ease 1.5s;
        }

        .content-visible { opacity: 1; pointer-events: auto; }

        header { padding: 3rem 0; display: flex; justify-content: flex-end; width: 100%; }
        .hero { text-align: right; padding: 100px 0; width: 100%; }
        .hero h1 { 
            font-size: clamp(3rem, 10vw, 5rem); 
            text-transform: uppercase; 
            font-variation-settings: "wght" 900;
            font-weight: 900;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; width: 100%; padding: 60px 0;}
        .card { background: var(--card-bg); height: 280px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }

        /* Секция для теста скролла */
        .footer-mock { height: 100vh; display: flex; align-items: center; justify-content: flex-end; }

        @media (max-width: 768px) {
            .content-wrapper { width: 100%; padding: 0 5%; align-items: center; background: rgba(15, 15, 15, 0.5); }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div id="load" data-percent="0">
            <img src="logo.jpg" alt="Logo" class="inner-logo">
        </div>
    </div>

    <div id="canvas-container"></div>

    <div class="content-wrapper" id="content">
        <header><h1>PORTFOLIO</h1></header>
        <section class="hero">
            <h1>Твое Имя</h1>
            <p>DIGITAL ARTIST | 3D MODELER</p>
        </section>
        <div class="grid">
            <div class="card"></div>
            <div class="card"></div>
            <div class="card"></div>
        </div>
        <div class="footer-mock">
            <h2>SCROLL WORKING ✓</h2>
        </div>
    </div>

    <script>
        let scene, camera, renderer, model, grid;
        let isDragging = false; 
        let canRotate = false; 
        let isHovering = false; 

        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5, 5, 5);
            scene.add(sun);

            grid = new THREE.GridHelper(20, 40, 0xad50c6, 0x222222);
            grid.position.set(-4.5, -2, 0);
            grid.material.transparent = true;
            grid.material.opacity = 0;
            scene.add(grid);

            const loader = new THREE.GLTFLoader();
            loader.load('character.glb', function(gltf) {
                model = gltf.scene;
                model.position.set(0, -2.5, 0); 
                model.scale.set(3.5, 3.5, 3.5); 

                model.traverse((node) => {
                    if (node.isMesh) {
                        node.material.wireframe = true;
                        node.material.color.setHex(0xffffff);
                        node.material.transparent = true;
                        node.material.opacity = 0; 
                    }
                });
                scene.add(model);
            });

            animate();
        }

        function triggerMorph() {
            if (model) {
                model.traverse((node) => {
                    if (node.isMesh) node.material.opacity = 1; 
                });
            }
            document.getElementById('content').classList.add('content-visible');
            setTimeout(startSideTransition, 800); 
        }

        function startSideTransition() {
            const duration = 2000; 
            const startTime = performance.now();
            const startPos = { x: 0, y: -2.5 };
            const endPos = { x: -4.5, y: -2 };

            function update() {
                const now = performance.now();
                const progress = Math.min((now - startTime) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3); 

                if (model) {
                    model.position.x = startPos.x + (endPos.x - startPos.x) * ease;
                    model.position.y = startPos.y + (endPos.y - startPos.y) * ease;
                }
                grid.material.opacity = ease * 0.5;

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    canRotate = true; // РАЗРЕШАЕМ КРУТИТЬ
                }
            }
            update();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (model) {
                if (canRotate && !isDragging) {
                    model.rotation.y += 0.005;
                }

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(model, true);
                isHovering = intersects.length > 0;

                // Управление курсором
                if (canRotate) {
                    if (isDragging) {
                        document.body.style.cursor = 'grabbing';
                    } else if (isHovering) {
                        document.body.style.cursor = 'grab';
                    } else {
                        document.body.style.cursor = 'default';
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // СОБЫТИЯ
        window.addEventListener('load', function() {
            const loaderElement = document.getElementById("load");
            const preloader = document.getElementById("preloader");
            let i = 0;
            const interval = setInterval(function () {
                if (i <= 360) {
                    loaderElement.style.background = `conic-gradient(var(--main-color) ${i}deg, #e6e7eb 0deg)`;
                    loaderElement.setAttribute('data-percent', Math.round(i / 3.6));
                    i += 4;
                } else {
                    clearInterval(interval);
                    preloader.classList.add('morph-animation');
                    setTimeout(() => {
                        preloader.classList.add('preloader-hidden');
                        triggerMorph();
                    }, 1100); 
                }
            }, 20);
        });

        document.addEventListener('mousedown', () => {
            if (canRotate && isHovering) isDragging = true;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (isDragging && model) {
                model.rotation.y += e.movementX * 0.01;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init3D();
    </script>
</body>
</html>
